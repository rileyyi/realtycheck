<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realty Check | Serverless Solo Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">

    <header class="border-b border-slate-800/80 bg-[#0e1424]/60 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
                <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="heading-font text-2xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">
                        Realty <span class="text-indigo-400">Check</span>
                    </h1>
                    <p class="text-[10px] tracking-widest text-indigo-400/80 font-bold uppercase -mt-0.5">Zero API Serverless Edition</p>
                </div>
            </div>
            
            <div id="nav-score-container" class="hidden flex items-center space-x-4 bg-slate-900/80 border border-slate-800 px-4 py-1.5 rounded-full">
                <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Score:</div>
                <div id="nav-score-display" class="font-mono text-base font-black text-indigo-400">0</div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto px-4 py-8 flex-grow flex items-center justify-center">

        <section id="screen-welcome" class="w-full max-w-xl bg-[#0f172a] p-8 rounded-3xl border border-slate-800/80 shadow-2xl relative overflow-hidden">
            <div class="text-center mb-8">
                <span class="px-3 py-1 rounded-full text-xs font-semibold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 uppercase tracking-widest">No API Required</span>
                <h2 class="heading-font text-3xl font-extrabold text-white mt-3 tracking-tight">Test Your Real Estate Intuition</h2>
                <p class="text-sm text-slate-400 mt-2 max-w-sm mx-auto">Select a regional market profile below. The engine will deploy actual properties curated directly from active lists.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-wider">Select Market Environment</label>
                    <select id="market-region" class="w-full bg-[#070a13] border border-slate-800 rounded-2xl px-4 py-4 text-white font-medium focus:outline-none focus:border-indigo-500 transition-all text-base appearance-none cursor-pointer">
                        <option value="ALL">All Mixed National Listings (Randomized)</option>
                        <option value="METRO">Major Metro & Luxury Lofts (High Value)</option>
                        <option value="SUBURB">Suburban Family Neighborhoods</option>
                        <option value="COASTAL">Coastal & Waterfront Properties</option>
                    </select>
                </div>

                <div class="pt-2">
                    <button id="start-game-btn" onclick="launchLocalEngine()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:opacity-95 text-white font-bold py-4 px-6 rounded-2xl shadow-xl shadow-indigo-500/10 tracking-wide uppercase text-sm transition-transform duration-150 transform hover:-translate-y-0.5">
                        Launch Market Challenge
                    </button>
                </div>
            </div>
        </section>

        <section id="screen-gameplay" class="w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch hidden">
            
            <div class="lg:col-span-7 bg-
